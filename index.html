<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iyannn Store - Panel Pterodactyl</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
    text-align:center;
}

header{
    padding:30px 20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin:15px auto;
    max-width:400px;
    animation:fadeIn 0.6s ease;
}

.btn{
    background:linear-gradient(45deg,#a855f7,#6366f1);
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

.hidden{
    display:none;
}

#payment{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:#0f172a;
    padding:30px 20px;
    overflow:auto;
}

.qr{
    width:100%;
    max-width:320px;
    border-radius:20px;
    margin-top:20px;
    animation:glow 2s infinite;
}

@keyframes glow{
    0%{box-shadow:0 0 20px #a855f7;}
    50%{box-shadow:0 0 50px #6366f1;}
    100%{box-shadow:0 0 20px #a855f7;}
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<h1>🚀 Iyannn Store</h1>
<p>Menjual Panel Pterodactyl 1GB - Unlimited</p>
<p>Whatsapp: 62895342462745</p>
<p><a href="https://lynk.id/iyannhosting" style="color:#c084fc;">My Lynk</a></p>
</header>

<div class="card">
<h3>📦 Panel 1GB - 10GB / Unli</h3>
<p>Aktif 30 Hari</p>
<button class="btn" onclick="showPayment()">Order Sekarang</button>
</div>

<div class="card">
<h3>📦 Reseller Panel</h3>
<p>1K / Bulan</p>
<button class="btn" onclick="showPayment()">Order Sekarang</button>
</div>

<div class="card">
<h3>📦 Install Panel Via VPS</h3>
<p>5K</p>
<button class="btn" onclick="showPayment()">Order Sekarang</button>
</div>

<!-- PAYMENT POPUP -->
<div id="payment" class="hidden">
<button class="btn" onclick="closePayment()">← Kembali</button>

<h2>QRIS Payment</h2>
<p>Kode Transaksi:</p>
<h3 id="trx"></h3>

<h3 id="timer" style="color:#ef4444;">05:00</h3>

<img src="https://files.catbox.moe/6q6d4f.jpg" class="qr">

<br><br>

<button class="btn" onclick="kirimWA()">Konfirmasi via WhatsApp</button>
</div>

<script>
let waktu = 300;
let countdown;

function generateTrx(){
    return "TRX-" + Math.random().toString(36).substr(2,6).toUpperCase();
}

function showPayment(){
    document.getElementById("payment").classList.remove("hidden");
    document.getElementById("trx").innerHTML = generateTrx();
    startTimer();
}

function closePayment(){
    document.getElementById("payment").classList.add("hidden");
    clearInterval(countdown);
    waktu = 300;
    document.getElementById("timer").innerHTML="05:00";
}

function startTimer(){
    clearInterval(countdown);
    waktu=300;

    countdown=setInterval(function(){
        let menit=Math.floor(waktu/60);
        let detik=waktu%60;

        document.getElementById("timer").innerHTML=
        (menit<10?"0":"")+menit+":"+
        (detik<10?"0":"")+detik;

        if(waktu<=0){
            clearInterval(countdown);
            closePayment();
        }
        waktu--;
    },1000);
}

function kirimWA(){
    let nomor="620895342462745";
    let trx=document.getElementById("trx").innerHTML;
    let pesan="Halo admin, saya sudah bayar.\nKode Transaksi: "+trx;

    window.open("https://wa.me/"62895342462745"?text="+encodeURIComponent(pesan),"_blank");
}
</script>

</body>
</html>
