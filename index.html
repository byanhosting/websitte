<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Byan Hosting</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
    text-align:center;
}

.container{
    padding:30px;
}

.hidden{
    display:none;
}

.btn{
    background:linear-gradient(45deg,#a855f7,#6366f1);
    color:white;
    padding:12px 22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin:10px;
}

.back{
    background:none;
    border:none;
    color:#c084fc;
    font-size:16px;
    cursor:pointer;
}

.qr{
    width:100%;
    max-width:380px;
    border-radius:20px;
    margin-top:20px;
    animation:glow 2s infinite;
}

@keyframes glow{
    0%{box-shadow:0 0 20px #a855f7;}
    50%{box-shadow:0 0 50px #6366f1;}
    100%{box-shadow:0 0 20px #a855f7;}
}

#notif{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#22c55e;
    padding:15px 25px;
    border-radius:12px;
    display:none;
}

#loadingScreen{
    position:fixed;
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
    <h1>Byan Hosting</h1>
    <p>Loading System...</p>
</div>

<!-- HOME -->
<div class="container" id="home">
    <h1>Welcome To Byan Hosting</h1>
    <button class="btn" onclick="showPayment()">Bayar Sekarang</button>
</div>

<!-- PAYMENT -->
<div class="container hidden" id="payment">
    <button class="back" onclick="backHome()">← Kembali</button>
    <h2>QRIS Payment</h2>

    <p>Kode Transaksi:</p>
    <h3 id="trx"></h3>

    <h3 id="timer" style="color:#ff4d4d;">05:00</h3>

    <img 
      src="https://files.catbox.moe/6q6d4f.jpg"
      class="qr"
    >

    <br><br>

    <button class="btn" onclick="kirimWA()">Konfirmasi via WhatsApp</button>
</div>

<div id="notif">Berhasil membuka WhatsApp 🚀</div>

<script>
let waktu = 300;
let countdown;

window.onload = function(){
    setTimeout(()=>{
        document.getElementById("loadingScreen").style.display="none";
    },2000);
}

function generateTrx(){
    return "BYN-" + Math.random().toString(36).substr(2,6).toUpperCase();
}

function showPayment(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("payment").classList.remove("hidden");
    document.getElementById("trx").innerHTML = generateTrx();
    mulaiTimer();
}

function backHome(){
    document.getElementById("payment").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
    clearInterval(countdown);
    waktu = 300;
    document.getElementById("timer").innerHTML="05:00";
}

function mulaiTimer(){
    clearInterval(countdown);
    waktu=300;

    countdown=setInterval(function(){
        let menit=Math.floor(waktu/60);
        let detik=waktu%60;

        document.getElementById("timer").innerHTML=
        (menit<10?"0":"")+menit+":"+
        (detik<10?"0":"")+detik;

        if(waktu<=0){
            clearInterval(countdown);
            backHome();
        }
        waktu--;
    },1000);
}

function kirimWA(){
    let nomor="62895342462745"; // GANTI NOMOR LU
    let trx=document.getElementById("trx").innerHTML;
    let pesan="Halo admin, saya sudah bayar. Kode Transaksi: "+trx;

    window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan),"_blank");

    let notif=document.getElementById("notif");
    notif.style.display="block";
    setTimeout(()=>notif.style.display="none",3000);
}
</script>

</body>
</html>
